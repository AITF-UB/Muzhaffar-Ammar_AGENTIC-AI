<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pilihan Ganda</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#5865F2; --accent-h:#4752C4; --bg:#202225; --panel:#2b2d31; --card:#313338; --text:#dcddde; --muted:#8e9297; --border:#454950; --lots:#3ba55c; --mots:#f0b132; --hots:#ed4245; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; }
        h1 { text-align:center; font-size:24px; color:#fff; margin-bottom:5px; }
        .section { width:100%; max-width:800px; display:flex; flex-direction:column; gap:15px; margin-bottom:40px; }
        textarea { width:100%; padding:15px; border:1px solid var(--border); border-radius:8px; font-family:monospace; resize:vertical; box-sizing:border-box; background:var(--card); color:#aeb5c0; font-size:13px; }
        .btn-primary { padding:12px 20px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:16px; font-weight:600; transition:.2s; }
        .btn-primary:hover { background:var(--accent-h); }
        .error-msg { color:var(--hots); font-weight:500; text-align:center; display:none; }
        .level-picker { display:none; flex-direction:column; align-items:center; width:100%; max-width:700px; gap:20px; }
        .level-picker h2 { color:#fff; margin:0; }
        .level-picker p { color:var(--muted); margin:0; text-align:center; }
        .level-cards { display:flex; gap:16px; width:100%; justify-content:center; flex-wrap:wrap; }
        .level-card { flex:1; min-width:180px; max-width:200px; background:var(--panel); border:2px solid var(--border); border-radius:14px; padding:24px 20px; cursor:pointer; transition:.2s; text-align:center; }
        .level-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
        .lots-card { border-color:var(--lots); } .lots-card:hover { background:rgba(59,165,92,.1); }
        .mots-card { border-color:var(--mots); } .mots-card:hover { background:rgba(240,177,50,.1); }
        .hots-card { border-color:var(--hots); } .hots-card:hover { background:rgba(237,66,69,.1); }
        .level-badge { font-size:24px; font-weight:700; margin-bottom:8px; }
        .lots-card .level-badge { color:var(--lots); } .mots-card .level-badge { color:var(--mots); } .hots-card .level-badge { color:var(--hots); }
        .level-desc { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:10px; }
        .soal-count { font-size:13px; font-weight:600; color:#fff; }
        .btn-back-sm { background:none; border:none; color:var(--muted); cursor:pointer; text-decoration:underline; font-size:13px; }
        .quiz-area { display:none; flex-direction:column; width:100%; max-width:720px; }
        .quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; font-size:13px; font-weight:600; color:var(--muted); }
        .level-tag { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
        .tag-LOTS { background:rgba(59,165,92,.15); color:var(--lots); }
        .tag-MOTS { background:rgba(240,177,50,.15); color:var(--mots); }
        .tag-HOTS { background:rgba(237,66,69,.15); color:var(--hots); }
        .question-text { font-size:18px; font-weight:500; color:#fff; line-height:1.6; margin-bottom:30px; background:var(--panel); padding:24px; border-radius:12px; border-left:4px solid var(--accent); }
        .options-container { display:flex; flex-direction:column; gap:12px; }
        .option { background:var(--panel); border:1px solid transparent; padding:18px 24px; border-radius:8px; cursor:pointer; display:flex; align-items:center; transition:.2s; font-size:15px; }
        .option:hover { background:#35373c; }
        .option.selected { border-color:var(--accent); background:rgba(88,101,242,.08); }
        .opt-label { margin-right:15px; font-weight:700; color:var(--muted); }
        .option.selected .opt-label { color:var(--accent); }
        .quiz-footer { display:flex; justify-content:space-between; margin-top:35px; }
        .btn-prev { background:transparent; color:#b5bac1; border:1px solid var(--border); border-radius:24px; padding:10px 32px; font-size:15px; font-weight:600; cursor:pointer; transition:.2s; }
        .btn-prev:hover:not(:disabled) { background:#35373c; color:#fff; }
        .btn-prev:disabled { border-color:#2f3136; color:#4f545c; cursor:not-allowed; }
        .btn-next { background:var(--accent); color:#fff; border:none; border-radius:24px; padding:10px 32px; font-size:15px; font-weight:600; cursor:pointer; transition:.2s; }
        .btn-next:hover { background:var(--accent-h); }
        .btn-next:disabled { background:#3f4147; color:#72767d; cursor:not-allowed; }
        .result-area { display:none; flex-direction:column; align-items:center; width:100%; max-width:720px; }
        .result-title { font-size:28px; color:#fff; margin-bottom:10px; }
        .score-display { font-size:20px; font-weight:600; margin-bottom:30px; color:var(--accent); background:rgba(88,101,242,.1); padding:15px 30px; border-radius:12px; }
        .review-container { width:100%; display:flex; flex-direction:column; gap:20px; margin-bottom:30px; }
        .review-item { background:var(--panel); border-radius:12px; padding:24px; box-sizing:border-box; border-left:5px solid transparent; }
        .review-item.correct { border-left-color:var(--lots); } .review-item.wrong { border-left-color:var(--hots); }
        .review-item h4 { margin:0 0 12px; color:#fff; font-size:16px; line-height:1.5; }
        .review-item p { margin:6px 0; font-size:14px; }
        .ans-correct { color:var(--lots); font-weight:600; } .ans-wrong { color:var(--hots); font-weight:600; } .ans-key-text { color:var(--lots); font-weight:600; }
        .pembahasan { margin-top:12px; color:#b5bac1; font-size:13.5px; line-height:1.6; background:rgba(0,0,0,.15); padding:12px; border-radius:8px; }
        .btn-back-input { margin-top:20px; background:none; border:none; color:var(--muted); cursor:pointer; text-decoration:underline; font-size:14px; }
        .btn-back-input:hover { color:var(--text); }
    </style>
</head>
<body>
<div class="section" id="inputSection">
    <h1>Generator Quiz PG</h1>
    <label><strong>Paste JSON dari <code>/agent/quiz</code>:</strong></label>
    <textarea id="jsonInput" rows="14">{
  "tipe": "quiz_soal", "jenjang": "10", "kelas": "10A",
  "mata_pelajaran": "Matematika", "elemen": "Bilangan", "materi": "Bilangan Berpangkat",
  "soal_per_level": {
    "LOTS": {
      "label": "Low Order Thinking Skills",
      "jumlah_soal": 2,
      "soal": [
        { "soal_id": "pg-lots-a1b2", "nomor": 1, "level": "LOTS",
          "pertanyaan": "Berapakah nilai dari 2³?",
          "pilihan": { "A": "6", "B": "8", "C": "9", "D": "12" },
          "jawaban_benar": "B", "pembahasan": "2³ = 2 × 2 × 2 = 8" },
        { "soal_id": "pg-lots-c3d4", "nomor": 2, "level": "LOTS",
          "pertanyaan": "Bilangan berpangkat nol selalu bernilai?",
          "pilihan": { "A": "0", "B": "1", "C": "Sama dengan basis", "D": "Tidak terdefinisi" },
          "jawaban_benar": "B", "pembahasan": "Setiap a⁰ = 1 (a ≠ 0)" }
      ]
    },
    "MOTS": { "label": "Mid Order Thinking Skills", "jumlah_soal": 0, "soal": [] },
    "HOTS": { "label": "High Order Thinking Skills", "jumlah_soal": 0, "soal": [] }
  }
}</textarea>
    <button class="btn-primary" onclick="parseAndPickLevel()">Pilih Level & Mulai Kuis</button>
    <div id="errorMsg" class="error-msg"></div>
</div>

<div class="level-picker" id="levelPicker">
    <h2>Pilih Level Kuis</h2>
    <p id="pickerDesc">Pilih tingkat kesulitan soal.</p>
    <div class="level-cards" id="levelCards"></div>
    <button class="btn-back-sm" onclick="showInput()">← Kembali ke Editor JSON</button>
</div>

<div class="quiz-area" id="quizArea">
    <div class="quiz-header">
        <span id="quizProgress">1 / 5</span>
        <span id="levelTagEl" class="level-tag tag-LOTS">LOTS</span>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="options-container" id="optionsContainer"></div>
    <div class="quiz-footer">
        <button class="btn-prev" id="btnPrev" onclick="prevQuestion()" disabled>Sebelumnya</button>
        <button class="btn-next" id="btnNext" onclick="nextQuestion()" disabled>Selanjutnya</button>
    </div>
</div>

<div class="result-area" id="resultArea">
    <h2 class="result-title">Kuis Selesai!</h2>
    <div class="score-display">Benar: <span id="scoreText"></span> dari <span id="totalText"></span></div>
    <div class="review-container" id="reviewContainer"></div>
    <button class="btn-back-input" onclick="showInput()">Kembali ke Editor JSON</button>
</div>

<script>
    let quizData=[], currentIndex=0, userAnswers=[], allLevelData=null, selectedLevel='';
    const LEVEL_META = {
        LOTS:{ cls:'lots-card', desc:'Mengingat & Memahami<br>(Bloom C1–C2)' },
        MOTS:{ cls:'mots-card', desc:'Menerapkan & Menganalisis<br>(Bloom C3–C4)' },
        HOTS:{ cls:'hots-card', desc:'Mengevaluasi & Mencipta<br>(Bloom C5–C6)' }
    };
    function parseAndPickLevel() {
        const err = document.getElementById('errorMsg');
        err.style.display = 'none';
        try {
            const data = JSON.parse(document.getElementById('jsonInput').value);
            if (data.soal_per_level) {
                allLevelData = data.soal_per_level;
                buildLevelCards(data.materi || 'Quiz');
                document.getElementById('inputSection').style.display = 'none';
                document.getElementById('levelPicker').style.display = 'flex';
            } else if (data.soal && Array.isArray(data.soal)) {
                quizData = data.soal; startQuizWithData('');
            } else { throw new Error("Tidak ada key 'soal_per_level' atau 'soal'."); }
        } catch(e) { err.innerText='JSON Error: '+e.message; err.style.display='block'; }
    }
    function buildLevelCards(materi) {
        document.getElementById('pickerDesc').innerText = 'Materi: '+materi;
        const c = document.getElementById('levelCards'); c.innerHTML = '';
        ['LOTS','MOTS','HOTS'].forEach(lvl => {
            const m = LEVEL_META[lvl], arr = (allLevelData[lvl]||{}).soal||[];
            const el = document.createElement('div');
            el.className = 'level-card '+m.cls;
            el.innerHTML = `<div class="level-badge">${lvl}</div><div class="level-desc">${m.desc}</div><div class="soal-count">${arr.length} soal</div>`;
            if (arr.length === 0) { el.style.opacity='.4'; el.style.cursor='not-allowed'; }
            else { el.onclick = () => selectLevel(lvl); }
            c.appendChild(el);
        });
    }
    function selectLevel(lvl) {
        selectedLevel = lvl;
        quizData = (allLevelData[lvl]||{}).soal||[];
        document.getElementById('levelPicker').style.display = 'none';
        startQuizWithData(lvl);
    }
    function startQuizWithData(lvl) {
        if (!quizData.length) { alert('Tidak ada soal.'); return; }
        currentIndex=0; userAnswers=new Array(quizData.length).fill(null);
        document.getElementById('resultArea').style.display='none';
        document.getElementById('quizArea').style.display='flex';
        const tag = document.getElementById('levelTagEl');
        tag.textContent = lvl||'QUIZ'; tag.className = `level-tag tag-${lvl||'LOTS'}`;
        renderQuestion();
    }
    function showInput() {
        ['inputSection','levelPicker','quizArea','resultArea'].forEach((id,i) =>
            document.getElementById(id).style.display = i===0?'flex':'none');
    }
    function renderQuestion() {
        const q=quizData[currentIndex], total=quizData.length;
        document.getElementById('quizProgress').innerText=`${currentIndex+1} / ${total}`;
        document.getElementById('questionText').innerText=q.pertanyaan;
        const oc=document.getElementById('optionsContainer'); oc.innerHTML='';
        Object.keys(q.pilihan||{}).forEach(k=>{
            const d=document.createElement('div');
            d.className='option'+(userAnswers[currentIndex]===k?' selected':'');
            d.onclick=()=>{userAnswers[currentIndex]=k;renderQuestion();};
            d.innerHTML=`<span class="opt-label">${k}</span> <span>${q.pilihan[k]}</span>`;
            oc.appendChild(d);
        });
        document.getElementById('btnPrev').disabled=(currentIndex===0);
        const nb=document.getElementById('btnNext');
        nb.disabled=!userAnswers[currentIndex];
        nb.innerText=currentIndex===total-1?'Selesai':'Selanjutnya';
    }
    function prevQuestion(){if(currentIndex>0){currentIndex--;renderQuestion();}}
    function nextQuestion(){if(currentIndex<quizData.length-1){currentIndex++;renderQuestion();}else{finishQuiz();}}
    function finishQuiz(){
        let ok=0; const rc=document.getElementById('reviewContainer'); rc.innerHTML='';
        quizData.forEach((q,i)=>{
            const ua=userAnswers[i],ca=q.jawaban_benar,isOk=(ua===ca);
            if(isOk)ok++;
            let h=`<div class="review-item ${isOk?'correct':'wrong'}"><h4>${i+1}. ${q.pertanyaan}</h4>`;
            if(isOk) h+=`<p>Jawaban: <span class="ans-correct">${ua} — ${q.pilihan[ua]}</span></p>`;
            else {
                h+=`<p>Jawaban: <span class="ans-wrong">${ua||'-'} — ${q.pilihan[ua]||'Kosong'}</span></p>`;
                h+=`<p class="ans-key-text">Kunci: ${ca} — ${q.pilihan[ca]}</p>`;
            }
            if(q.pembahasan) h+=`<div class="pembahasan"><strong>Pembahasan:</strong><br>${q.pembahasan}</div>`;
            h+='</div>'; rc.innerHTML+=h;
        });
        document.getElementById('quizArea').style.display='none';
        document.getElementById('resultArea').style.display='flex';
        document.getElementById('scoreText').innerText=ok;
        document.getElementById('totalText').innerText=quizData.length;
    }
</script>
</body>
</html>

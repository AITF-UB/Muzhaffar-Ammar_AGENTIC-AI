<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Interaktif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#5865F2; --accent-h:#4752C4; --bg:#252830; --panel:#313338; --card:#1a1c22; --text:#fff; --muted:#8f95a3; --border:#444b5f; --lots:#3ba55c; --mots:#f0b132; --hots:#ed4245; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; }
        h1 { text-align:center; font-size:24px; margin-bottom:5px; }
        .section { width:100%; max-width:800px; display:flex; flex-direction:column; gap:15px; margin-bottom:40px; }
        textarea { width:100%; padding:15px; border:1px solid var(--border); border-radius:8px; font-family:monospace; resize:vertical; box-sizing:border-box; background:var(--card); color:#aeb5c0; font-size:13px; }
        .btn-generate { padding:12px 20px; background:#444b5f; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:16px; font-weight:600; transition:.3s; }
        .btn-generate:hover { background:#555e76; }
        .error-msg { color:#fa777c; font-weight:500; text-align:center; display:none; }
        /* Level Picker */
        .level-picker { display:none; flex-direction:column; align-items:center; width:100%; max-width:700px; gap:20px; }
        .level-picker h2 { color:#fff; margin:0; }
        .level-picker p { color:var(--muted); margin:0; text-align:center; }
        .level-cards { display:flex; gap:16px; width:100%; justify-content:center; flex-wrap:wrap; }
        .level-card { flex:1; min-width:180px; max-width:200px; background:#2b2d31; border:2px solid var(--border); border-radius:14px; padding:24px 20px; cursor:pointer; transition:.2s; text-align:center; }
        .level-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.4); }
        .lots-card { border-color:var(--lots); } .lots-card:hover { background:rgba(59,165,92,.1); }
        .mots-card { border-color:var(--mots); } .mots-card:hover { background:rgba(240,177,50,.1); }
        .hots-card { border-color:var(--hots); } .hots-card:hover { background:rgba(237,66,69,.1); }
        .level-badge { font-size:24px; font-weight:700; margin-bottom:8px; }
        .lots-card .level-badge { color:var(--lots); } .mots-card .level-badge { color:var(--mots); } .hots-card .level-badge { color:var(--hots); }
        .level-desc { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:10px; }
        .kartu-count { font-size:13px; font-weight:600; color:#fff; }
        .btn-back-sm { background:none; border:none; color:var(--muted); cursor:pointer; text-decoration:underline; font-size:13px; }
        /* Flashcard Area */
        .flashcard-area { display:none; flex-direction:column; align-items:center; width:100%; max-width:600px; margin-top:40px; }
        .level-tag { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:20px; }
        .tag-LOTS { background:rgba(59,165,92,.15); color:var(--lots); }
        .tag-MOTS { background:rgba(240,177,50,.15); color:var(--mots); }
        .tag-HOTS { background:rgba(237,66,69,.15); color:var(--hots); }
        .hint { color:var(--muted); font-size:14px; margin-bottom:30px; }
        .card-container { position:relative; width:100%; max-width:440px; height:440px; perspective:1000px; margin-bottom:40px; }
        .glow { position:absolute; top:50%; left:50%; width:110%; height:110%; background:radial-gradient(circle at top left,rgba(88,101,242,.5) 0%,transparent 40%),radial-gradient(circle at bottom right,rgba(39,174,96,.4) 0%,transparent 40%),radial-gradient(circle at center,rgba(235,87,87,.2) 0%,transparent 60%); transform:translate(-50%,-50%); filter:blur(40px); z-index:0; pointer-events:none; }
        .card { position:absolute; width:100%; height:100%; transform-style:preserve-3d; transition:transform .6s cubic-bezier(.4,.2,.2,1); cursor:pointer; z-index:1; }
        .card.is-flipped { transform:rotateY(180deg); }
        .card-face { position:absolute; width:100%; height:100%; backface-visibility:hidden; background:#313338; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.4); padding:24px 30px; box-sizing:border-box; display:flex; flex-direction:column; }
        .card-back { transform:rotateY(180deg); background:#2b2d31; }
        .card-header { display:flex; justify-content:space-between; align-items:center; color:#949ba4; font-size:14px; font-weight:500; margin-bottom:20px; }
        .card-content { flex-grow:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; font-size:22px; line-height:1.5; word-break:break-word; overflow-y:auto; }
        .card-back .card-content { font-size:16px; text-align:left; align-items:flex-start; }
        .card-content::-webkit-scrollbar { width:6px; }
        .card-content::-webkit-scrollbar-thumb { background:#4f545c; border-radius:10px; }
        .kutipan { margin-top:15px; font-size:13px; color:var(--muted); font-style:italic; border-top:1px solid #3f4147; padding-top:15px; width:100%; }
        .card-footer { text-align:center; color:#949ba4; font-size:13px; margin-top:20px; font-weight:500; }
        .controls { display:flex; gap:15px; align-items:center; justify-content:center; z-index:2; }
        .control-btn { background:#313338; border:none; color:#dbdee1; border-radius:50%; width:48px; height:48px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:.2s; box-shadow:0 4px 10px rgba(0,0,0,.2); }
        .control-btn:hover { background:#3f4147; }
        .control-btn:disabled { opacity:.4; cursor:not-allowed; }
        .btn-back-input { margin-top:40px; background:none; border:none; color:var(--muted); cursor:pointer; text-decoration:underline; font-size:14px; }
        .btn-back-input:hover { color:#dbdee1; }
    </style>
</head>
<body>
<div class="section" id="inputSection">
    <h1>Generator Flashcard</h1>
    <label><strong>Paste JSON dari <code>/agent/flashcard</code>:</strong></label>
    <textarea id="jsonInput" rows="14">{
  "tipe": "flashcard_set", "jenjang": "11", "kelas": "11A",
  "mata_pelajaran": "Biologi", "elemen": "Sistem Kehidupan", "materi": "Fotosintesis",
  "kartu_per_level": {
    "LOTS": {
      "label": "Low Order Thinking Skills",
      "jumlah_kartu": 2,
      "kartu": [
        { "front": "Apa yang dimaksud fotosintesis?", "back": "Fotosintesis adalah proses pembuatan makanan oleh tumbuhan menggunakan cahaya matahari, air, dan CO₂.", "kutipan_sumber": "Buku Biologi Kelas 11", "level": "LOTS" },
        { "front": "Di manakah fotosintesis terjadi?", "back": "Fotosintesis terjadi di dalam kloroplas, tepatnya di grana (reaksi terang) dan stroma (reaksi gelap).", "kutipan_sumber": "Buku Biologi Kelas 11", "level": "LOTS" }
      ]
    },
    "MOTS": { "label": "Mid Order Thinking Skills", "jumlah_kartu": 0, "kartu": [] },
    "HOTS": { "label": "High Order Thinking Skills", "jumlah_kartu": 0, "kartu": [] }
  }
}</textarea>
    <button class="btn-generate" onclick="parseAndPickLevel()">Pilih Level & Buat Flashcard</button>
    <div id="errorMsg" class="error-msg"></div>
</div>

<div class="level-picker" id="levelPicker">
    <h2>Pilih Level Flashcard</h2>
    <p id="pickerDesc">Pilih tingkat kesulitan kartu yang ingin dipelajari.</p>
    <div class="level-cards" id="levelCards"></div>
    <button class="btn-back-sm" onclick="showInput()">← Kembali ke Editor JSON</button>
</div>

<div class="flashcard-area" id="flashcardArea">
    <div id="levelTagEl" class="level-tag tag-LOTS">LOTS</div>
    <div class="hint">Space: flip &nbsp;|&nbsp; ← →: navigasi</div>
    <div class="card-container">
        <div class="glow"></div>
        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="card-header">
                    <span id="cardCountFront">1 / 5</span>
                    <span style="letter-spacing:2px;cursor:pointer;">⋮</span>
                </div>
                <div class="card-content" id="cardFrontText">Front Text</div>
                <div class="card-footer">See answer</div>
            </div>
            <div class="card-face card-back">
                <div class="card-header">
                    <span id="cardCountBack">1 / 5</span>
                    <span style="letter-spacing:2px;cursor:pointer;">⋮</span>
                </div>
                <div class="card-content">
                    <div id="cardBackText">Back Text</div>
                    <div id="kutipanSumber" class="kutipan"></div>
                </div>
                <div class="card-footer">See question</div>
            </div>
        </div>
    </div>
    <div class="controls">
        <button class="control-btn" id="btnPrev" onclick="prevCard()">&#8592;</button>
        <button class="control-btn" id="btnNext" onclick="nextCard()">&#8594;</button>
    </div>
    <button class="btn-back-input" onclick="showInput()">Kembali ke Editor JSON</button>
</div>

<script>
    let flashcardsData=[], currentIndex=0, isFlipped=false, allLevelData=null;
    const LEVEL_META = {
        LOTS:{ cls:'lots-card', desc:'Mengingat & Memahami<br>(Bloom C1–C2)' },
        MOTS:{ cls:'mots-card', desc:'Menerapkan & Menganalisis<br>(Bloom C3–C4)' },
        HOTS:{ cls:'hots-card', desc:'Mengevaluasi & Mencipta<br>(Bloom C5–C6)' }
    };
    function parseAndPickLevel(){
        const err=document.getElementById('errorMsg'); err.style.display='none';
        try {
            const data=JSON.parse(document.getElementById('jsonInput').value);
            if (data.kartu_per_level) {
                allLevelData=data.kartu_per_level;
                buildLevelCards(data.materi||'Flashcard');
                document.getElementById('inputSection').style.display='none';
                document.getElementById('levelPicker').style.display='flex';
            } else if (data.kartu && Array.isArray(data.kartu)) {
                flashcardsData=data.kartu; startFlashcardWithData('');
            } else { throw new Error("Tidak ada key 'kartu_per_level' atau 'kartu'."); }
        } catch(e){ err.innerText='JSON Error: '+e.message; err.style.display='block'; }
    }
    function buildLevelCards(materi){
        document.getElementById('pickerDesc').innerText='Materi: '+materi;
        const c=document.getElementById('levelCards'); c.innerHTML='';
        ['LOTS','MOTS','HOTS'].forEach(lvl=>{
            const m=LEVEL_META[lvl], arr=(allLevelData[lvl]||{}).kartu||[];
            const el=document.createElement('div'); el.className='level-card '+m.cls;
            el.innerHTML=`<div class="level-badge">${lvl}</div><div class="level-desc">${m.desc}</div><div class="kartu-count">${arr.length} kartu</div>`;
            if(arr.length===0){el.style.opacity='.4';el.style.cursor='not-allowed';}
            else{el.onclick=()=>selectLevel(lvl);}
            c.appendChild(el);
        });
    }
    function selectLevel(lvl){
        flashcardsData=(allLevelData[lvl]||{}).kartu||[];
        document.getElementById('levelPicker').style.display='none';
        startFlashcardWithData(lvl);
    }
    function startFlashcardWithData(lvl){
        if(!flashcardsData.length){alert('Tidak ada kartu.');return;}
        currentIndex=0; isFlipped=false;
        document.getElementById('flashcardArea').style.display='flex';
        const tag=document.getElementById('levelTagEl');
        tag.textContent=lvl||'FLASHCARD'; tag.className=`level-tag tag-${lvl||'LOTS'}`;
        renderCard();
    }
    function showInput(){
        document.getElementById('inputSection').style.display='flex';
        document.getElementById('levelPicker').style.display='none';
        document.getElementById('flashcardArea').style.display='none';
    }
    function renderCard(){
        if(!flashcardsData.length)return;
        const card=flashcardsData[currentIndex], total=flashcardsData.length;
        document.getElementById('cardCountFront').innerText=`${currentIndex+1} / ${total}`;
        document.getElementById('cardCountBack').innerText=`${currentIndex+1} / ${total}`;
        document.getElementById('cardFrontText').innerText=card.front;
        document.getElementById('cardBackText').innerText=card.back;
        const ktp=document.getElementById('kutipanSumber');
        if(card.kutipan_sumber&&card.kutipan_sumber.trim()){
            ktp.innerText=`Kutipan: "${card.kutipan_sumber}"`; ktp.style.display='block';
        } else { ktp.style.display='none'; }
        const cardEl=document.getElementById('flashcard');
        if(isFlipped){
            cardEl.style.transition='none'; cardEl.classList.remove('is-flipped'); isFlipped=false;
            setTimeout(()=>cardEl.style.transition='transform .6s cubic-bezier(.4,.2,.2,1)',50);
        }
        document.getElementById('btnPrev').disabled=(currentIndex===0);
        document.getElementById('btnNext').disabled=(currentIndex===total-1);
    }
    function flipCard(){const el=document.getElementById('flashcard');isFlipped=!isFlipped;if(isFlipped)el.classList.add('is-flipped');else el.classList.remove('is-flipped');}
    function nextCard(){if(currentIndex<flashcardsData.length-1){currentIndex++;renderCard();}}
    function prevCard(){if(currentIndex>0){currentIndex--;renderCard();}}
    document.addEventListener('keydown',e=>{
        if(document.getElementById('flashcardArea').style.display==='flex'&&document.activeElement.tagName!=='TEXTAREA'){
            if(e.code==='Space'){e.preventDefault();flipCard();}
            else if(e.code==='ArrowRight'){e.preventDefault();nextCard();}
            else if(e.code==='ArrowLeft'){e.preventDefault();prevCard();}
        }
    });
</script>
</body>
</html>

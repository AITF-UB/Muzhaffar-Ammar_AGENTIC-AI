<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to Flashcard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #252830;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-section {
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 5px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #444b5f;
            border-radius: 8px;
            font-family: monospace;
            resize: vertical;
            box-sizing: border-box;
            background-color: #1a1c22;
            color: #aeb5c0;
            font-size: 14px;
        }

        .btn-generate {
            padding: 12px 20px;
            background-color: #444b5f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .btn-generate:hover {
            background-color: #555e76;
        }

        .error-msg {
            color: #fa777c;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        /* Flashcard Area */
        .flashcard-area {
            display: none;
            /* change to flex via JS */
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
        }

        .hint {
            color: #8f95a3;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .card-container {
            position: relative;
            width: 100%;
            max-width: 440px;
            height: 440px;
            perspective: 1000px;
            margin-bottom: 40px;
        }

        /* The Glow Effect */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 110%;
            height: 110%;
            background: radial-gradient(circle at top left, rgba(88, 101, 242, 0.5) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(39, 174, 96, 0.4) 0%, transparent 40%),
                radial-gradient(circle at center, rgba(235, 87, 87, 0.2) 0%, transparent 60%);
            transform: translate(-50%, -50%);
            filter: blur(40px);
            z-index: 0;
            border-radius: 20px;
            pointer-events: none;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            cursor: pointer;
            z-index: 1;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: #313338;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            padding: 24px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #2b2d31;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #949ba4;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .menu-icon {
            cursor: pointer;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 22px;
            line-height: 1.5;
            word-break: break-word;
            font-weight: 400;
            overflow-y: auto;
        }

        .card-back .card-content {
            font-size: 16px;
            text-align: left;
            align-items: flex-start;
        }

        /* Custom Scrollbar for inner texts */
        .card-content::-webkit-scrollbar {
            width: 6px;
        }

        .card-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .card-content::-webkit-scrollbar-thumb {
            background-color: #4f545c;
            border-radius: 10px;
        }

        .kutipan {
            margin-top: 15px;
            font-size: 13px;
            color: #8f95a3;
            font-style: italic;
            border-top: 1px solid #3f4147;
            padding-top: 15px;
            width: 100%;
        }

        .card-footer {
            text-align: center;
            color: #949ba4;
            font-size: 13px;
            margin-top: 20px;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .control-btn {
            background-color: #313338;
            border: none;
            color: #dbdee1;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.2s, transform 0.1s;
            outline: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            background-color: #3f4147;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .action-btn {
            width: auto;
            border-radius: 24px;
            padding: 0 20px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }

        .btn-wrong {
            color: #fa777c;
            border-color: #4a3436;
        }

        .btn-wrong:hover {
            background-color: #4a3436;
        }

        .btn-correct {
            color: #3ba55c;
            border-color: #2b3b31;
        }

        .btn-correct:hover {
            background-color: #2b3b31;
        }

        /* Back to input button */
        .btn-back-input {
            margin-top: 40px;
            background: none;
            border: none;
            color: #8f95a3;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
            transition: color 0.2s;
        }

        .btn-back-input:hover {
            color: #dbdee1;
        }
    </style>
</head>

<body>

    <div class="input-section" id="inputSection">
        <h1>Generator Flashcard</h1>
        <label for="jsonInput"><strong>Masukkan JSON Anda di sini:</strong></label>
        <textarea id="jsonInput" rows="20">{
  "tipe": "flashcard_set",
  "topik": "variabel",
  "jumlah_kartu": 5,
  "kartu": [
    {
      "front": "Mengapa nama variabel tidak boleh diawali dengan angka dalam pemrograman?",
      "back": "Nama variabel tidak boleh diawali dengan angka karena menurut standar sintaks pemrograman, karakter pertama dalam nama variabel harus merupakan huruf atau karakter underscore (_). Ini memungkinkan pemrogram untuk membuat nama variabel yang mudah dibaca dan memahami. Kutipan sumber: 'Nama variabel tidak boleh diawali dengan angka.'",
      "kutipan_sumber": "Variabel dalam pemrograman adalah tempat menyimpan data."
    },
    {
      "front": "Bagaimana pernyataan kondisional (if-else) digunakan dalam pemrograman?",
      "back": "Pernyataan kondisional (if-else) digunakan untuk membuat keputusan dalam program. Jika kondisi yang ditentukan (nilai > 75) adalah benar, blok kode di dalam if dieksekusi. Jika tidak, blok kode di dalam else dieksekusi. Ini memungkinkan program untuk beradaptasi dengan berbagai kondisi input. Kutipan sumber: 'Pernyataan kondisional (If-Else) dalam pemrograman digunakan untuk mengambil keputusan.'",
      "kutipan_sumber": "Pernyataan Kondisional (If-Else) dalam pemrograman digunakan untuk mengambil keputusan."
    },
    {
      "front": "Mengapa pernyataan kondisional penting dalam logika algoritma?",
      "back": "Pernyataan kondisional penting dalam logika algoritma karena membuat program menjadi dinamis. Dengan pernyataan ini, program dapat mengambil keputusan berdasarkan kondisi tertentu, sehingga mampu merespons berbagai input dan situasi dengan cara yang berbeda. Kutipan sumber: 'Kondisional sangat penting dalam logika algoritma karena membuat program menjadi dinamis.'",
      "kutipan_sumber": "Pernyataan Kondisional (If-Else) dalam pemrograman digunakan untuk mengambil keputusan."
    },
    {
      "front": "Jelaskan tipe data umum yang dapat disimpan dalam variabel.",
      "back": "Tipe data umum yang dapat disimpan dalam variabel meliputi Integer (angka), String (teks), dan Boolean (True/False). Ini memungkinkan variabel untuk menyimpan berbagai jenis data sesuai dengan kebutuhan program. Kutipan sumber: 'Tipe data umum meliputi Integer (angka), String (teks), dan Boolean (True/False).'",
      "kutipan_sumber": "Tipe data umum meliputi Integer (angka), String (teks), dan Boolean (True/False)."
    },
    {
      "front": "Berikan contoh penggunaan pernyataan if-else dalam pemrograman.",
      "back": "Contoh penggunaan pernyataan if-else dalam pemrograman adalah sebagai berikut: if nilai > 75: print(\"Lulus\") else: print(\"Remedial\"). Dalam contoh ini, jika nilai lebih dari 75, program akan mencetak 'Lulus'. Jika tidak, program akan mencetak 'Remedial'. Ini menunjukkan bagaimana pernyataan if-else digunakan untuk membuat keputusan berdasarkan kondisi tertentu. Kutipan sumber: 'Contoh: if nilai > 75: print(\"Lulus\") else: print(\"Remedial\")'.",
      "kutipan_sumber": "Contoh: if nilai > 75: print(\"Lulus\") else: print(\"Remedial\")"
    }
  ]
}</textarea>
        <button class="btn-generate" onclick="generateFlashcards()">Buat Flashcard</button>
        <div id="errorMsg" class="error-msg">Format JSON tidak valid. Silakan periksa kembali.</div>
    </div>

    <div class="flashcard-area" id="flashcardArea">
        <div class="hint">Press "Space" to flip, "← / →" to navigate</div>

        <div class="card-container">
            <div class="glow"></div>
            <div class="card" id="flashcard" onclick="flipCard()">
                <div class="card-face card-front">
                    <div class="card-header">
                        <span id="cardCountFront">1 / 5</span>
                        <span class="menu-icon">⋮</span>
                    </div>
                    <div class="card-content" id="cardFrontText">
                        Front Text
                    </div>
                    <div class="card-footer">
                        See answer
                    </div>
                </div>

                <div class="card-face card-back">
                    <div class="card-header">
                        <span id="cardCountBack">1 / 5</span>
                        <span class="menu-icon">⋮</span>
                    </div>
                    <div class="card-content">
                        <div id="cardBackText">Back Text</div>
                        <div id="kutipanSumber" class="kutipan"></div>
                    </div>
                    <div class="card-footer">
                        See question
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="btnPrev" onclick="prevCard()" title="Previous (Left Arrow)">&#8592;</button>
            <!-- <button class="control-btn action-btn btn-wrong" onclick="markWrong()" title="Mark as wrong">
                <span>&times;</span> <span id="wrongCount">0</span>
            </button>
            <button class="control-btn action-btn btn-correct" onclick="markCorrect()" title="Mark as correct">
                <span>&#10003;</span> <span id="correctCount">0</span>
            </button> -->
            <button class="control-btn" id="btnNext" onclick="nextCard()" title="Next (Right Arrow)">&#8594;</button>
        </div>

        <button class="btn-back-input" onclick="showInput()">Kembali ke Editor JSON</button>
    </div>

    <script>
        let flashcardsData = [];
        let currentIndex = 0;
        let isFlipped = false;
        let wrongCount = 0;
        let correctCount = 0;

        function generateFlashcards() {
            const inputStr = document.getElementById('jsonInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const flashcardArea = document.getElementById('flashcardArea');
            const inputSection = document.getElementById('inputSection');

            errorMsg.style.display = 'none';

            try {
                const data = JSON.parse(inputStr);
                if (data && data.kartu && Array.isArray(data.kartu)) {
                    flashcardsData = data.kartu;
                    currentIndex = 0;
                    isFlipped = false;
                    wrongCount = 0;
                    correctCount = 0;

                    // updateCounts();
                    renderCard();

                    inputSection.style.display = 'none';
                    flashcardArea.style.display = 'flex';
                } else {
                    throw new Error("Format tidak sesuai, pastikan ada key 'kartu' dengan nilai array");
                }
            } catch (e) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Format JSON tidak valid: " + e.message;
            }
        }

        function showInput() {
            document.getElementById('inputSection').style.display = 'flex';
            document.getElementById('flashcardArea').style.display = 'none';
        }

        function renderCard() {
            if (flashcardsData.length === 0) return;

            const card = flashcardsData[currentIndex];
            const total = flashcardsData.length;

            document.getElementById('cardCountFront').innerText = `${currentIndex + 1} / ${total}`;
            document.getElementById('cardCountBack').innerText = `${currentIndex + 1} / ${total}`;

            document.getElementById('cardFrontText').innerText = card.front;
            document.getElementById('cardBackText').innerText = card.back;

            const kutipanEl = document.getElementById('kutipanSumber');
            if (card.kutipan_sumber && card.kutipan_sumber.trim() !== "") {
                kutipanEl.innerText = `Kutipan sumber:\n"${card.kutipan_sumber}"`;
                kutipanEl.style.display = 'block';
            } else {
                kutipanEl.style.display = 'none';
            }

            // Reset flip state seamlessly when moving to next/prev
            const cardEl = document.getElementById('flashcard');
            if (isFlipped) {
                // Remove flip class, temporarily ignore transition to avoid showing back-side rotating
                cardEl.style.transition = 'none';
                cardEl.classList.remove('is-flipped');
                isFlipped = false;

                // Force reflow and re-add transition
                setTimeout(() => {
                    cardEl.style.transition = 'transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1)';
                }, 50);
            }

            document.getElementById('btnPrev').disabled = currentIndex === 0;
            document.getElementById('btnNext').disabled = currentIndex === total - 1;
        }

        function flipCard() {
            const cardEl = document.getElementById('flashcard');
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardEl.classList.add('is-flipped');
            } else {
                cardEl.classList.remove('is-flipped');
            }
        }

        function nextCard() {
            if (currentIndex < flashcardsData.length - 1) {
                currentIndex++;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            }
        }

        // function markWrong() {
        //     wrongCount++;
        //     updateCounts();
        //     if (currentIndex < flashcardsData.length - 1) {
        //         nextCard();
        //     }
        // }

        // function markCorrect() {
        //     correctCount++;
        //     updateCounts();
        //     if (currentIndex < flashcardsData.length - 1) {
        //         nextCard();
        //     }
        // }

        // function updateCounts() {
        //     document.getElementById('wrongCount').innerText = wrongCount;
        //     document.getElementById('correctCount').innerText = correctCount;
        // }

        // Global Keyboard Event Listener
        document.addEventListener('keydown', function (event) {
            // Only trigger if flashcard area is active and no active input elements
            if (document.getElementById('flashcardArea').style.display === 'flex' && document.activeElement.tagName !== 'TEXTAREA') {
                if (event.code === 'Space') {
                    event.preventDefault(); // Prevent page scroll
                    flipCard();
                } else if (event.code === 'ArrowRight') {
                    event.preventDefault();
                    nextCard();
                } else if (event.code === 'ArrowLeft') {
                    event.preventDefault();
                    prevCard();
                }
            }
        });
    </script>
</body>

</html>
